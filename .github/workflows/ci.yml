name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run migrations (SQLite)
        env:
          ALEMBIC_DATABASE_URL: sqlite:///./ci.db
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        run: pytest

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure .env is not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env не должен быть в репозитории" && exit 1
          fi
          echo "OK: .env отсутствует в индексе"
      - name: Scan for obvious secrets
        run: |
          if grep -rnE 'BEGIN (RSA|OPENSSH|PRIVATE) KEY|AKIA[0-9A-Z]{16}|xox[baprs]-' \
            --include='*.py' --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.env*' . ; then
            echo "ERROR: обнаружены возможные секреты" && exit 1
          fi
          echo "OK: очевидных секретов не найдено"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build
