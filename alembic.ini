# Конфигурация Alembic. Файлы миграций — в database/migrations
# (ARCHITECTURE.md раздел 15, D-016). URL подключения задаётся в env.py из
# переменных окружения; секреты здесь не хранятся.
[alembic]
script_location = database/migrations
prepend_sys_path = backend
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
