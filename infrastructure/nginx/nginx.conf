# Обратный прокси Badrudin AI OS (T-1.J1).
# Маршрутизация frontend / backend / n8n. TLS-терминация и принудительный
# HTTPS-редирект настраиваются в T-1.J2 (выпуск домена и сертификата, R3);
# соответствующий server-блок на 443 подключается после появления сертификата.

upstream badrudin_backend {
    server backend:8000;
}
upstream badrudin_frontend {
    server frontend:3000;
}
upstream badrudin_n8n {
    server n8n:5678;
}

server {
    listen 80;
    server_name _;

    # API
    location /api/ {
        proxy_pass http://badrudin_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # n8n
    location /n8n/ {
        proxy_pass http://badrudin_n8n/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (всё остальное)
    location / {
        proxy_pass http://badrudin_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

